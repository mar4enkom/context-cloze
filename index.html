<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тренировка текста</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --panel: #ffffff;
      --text: #2b2724;
      --muted: #988b7f;
      --border: #cdbfae;
      --accent: #7b5a43;
      --active: #ede3d6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      padding: 12px;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid #e8ddd1;
      border-radius: 14px;
      padding: 12px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      line-height: 1.6;
      outline: none;
      padding: 0;
    }

    textarea::placeholder { color: #a29688; }

    .controls {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .label {
      font-size: 16px;
      color: var(--accent);
      min-width: 98px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      min-width: 52px;
      height: 40px;
      padding: 0 14px;
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
    }

    button.active {
      background: var(--active);
      border-color: #b89d84;
      color: #5f4431;
      font-weight: 600;
    }

    button.wide {
      min-width: auto;
      padding: 0 14px;
    }

    .output {
      min-height: 220px;
      font-size: 18px;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty { color: var(--muted); }

    .blurred {
      filter: blur(6px);
      user-select: none;
      cursor: pointer;
      transition: filter 0.16s ease;
    }

    .masked {
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .excerpt {
      cursor: pointer;
    }

    .revealed {
      filter: none !important;
      letter-spacing: normal;
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .panel { padding: 11px; }
      textarea, .output { font-size: 17px; }
      .label { min-width: 86px; font-size: 15px; }
      button { height: 38px; min-width: 48px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <textarea id="sourceText" placeholder="Вставь текст..."></textarea>
    </div>

    <div class="panel controls">
      <div class="row">
        <div class="label">Слова (%)</div>
        <div class="buttons" id="wordPercentGroup">
          <button data-word-percent="20" class="active">20</button>
          <button data-word-percent="30">30</button>
          <button data-word-percent="40">40</button>
          <button data-word-percent="50">50</button>
        </div>
      </div>

      <div class="row">
        <div class="label">Отрывок (%)</div>
        <div class="buttons" id="excerptPercentGroup">
          <button data-excerpt-percent="0" class="active">0</button>
          <button data-excerpt-percent="10">10</button>
          <button data-excerpt-percent="20">20</button>
          <button data-excerpt-percent="30">30</button>
          <button data-excerpt-percent="40">40</button>
        </div>
      </div>

      <div class="row">
        <div class="buttons">
          <button id="modeBtn" class="wide">Все буквы, кроме первых</button>
          <button id="showBtn" class="wide">Показать</button>
          <button id="shuffleBtn" class="wide">Перемешать</button>
          <button id="revealAllBtn" class="wide">Открыть всё</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div id="output" class="output"><span class="empty">Текст появится здесь.</span></div>
    </div>
  </div>

  <script>
    const sourceText = document.getElementById('sourceText');
    const output = document.getElementById('output');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const showBtn = document.getElementById('showBtn');
    const revealAllBtn = document.getElementById('revealAllBtn');
    const modeBtn = document.getElementById('modeBtn');
    const wordPercentGroup = document.getElementById('wordPercentGroup');
    const excerptPercentGroup = document.getElementById('excerptPercentGroup');

    let currentWordPercent = 20;
    let currentExcerptPercent = 0;
    let currentMode = 'first'; // 'first' | 'blur'
    let lastRenderState = null;

    function tokenize(text) {
      return text.match(/\p{L}[\p{L}\p{M}'’\-–—]*|\p{N}+|\s+|[^\s\p{L}\p{N}]/gu) || [];
    }

    function isWordLike(token) {
      return /^(?:\p{L}[\p{L}\p{M}'’\-–—]*|\p{N}+)$/u.test(token);
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function splitSentences(text) {
      const parts = text.match(/[^.!?\n]+(?:[.!?]+|$)|\n+/g) || [];
      const result = [];
      let cursor = 0;
      for (const part of parts) {
        const start = cursor;
        cursor += part.length;
        result.push({ text: part, start, end: cursor, isNewline: /^\n+$/.test(part) });
      }
      return result;
    }

    function pickHiddenWordIndexes(tokens, percent) {
      const wordIndexes = [];
      tokens.forEach((token, index) => {
        if (isWordLike(token)) wordIndexes.push(index);
      });

      if (!wordIndexes.length || percent <= 0) return new Set();
      const hideCount = Math.max(1, Math.round(wordIndexes.length * percent / 100));
      return new Set(shuffle(wordIndexes).slice(0, hideCount));
    }

    function pickExcerptCharacterRanges(text, percent) {
      if (!text || percent <= 0) return [];
      const sentences = splitSentences(text).filter(item => !item.isNewline && item.text.trim());
      if (!sentences.length) return [];

      const count = Math.max(1, Math.round(sentences.length * percent / 100));
      const startIndex = Math.floor(Math.random() * Math.max(1, sentences.length - count + 1));
      const selected = sentences.slice(startIndex, startIndex + count);
      return [{ start: selected[0].start, end: selected[selected.length - 1].end }];
    }

    function isInsideRanges(position, ranges) {
      return ranges.some(range => position >= range.start && position < range.end);
    }

    function maskWord(token) {
      if (token.length <= 1) return token;
      return token[0] + '•'.repeat(token.length - 1);
    }

    function renderText(text, wordHiddenIndexes, excerptRanges, revealAll = false) {
      output.innerHTML = '';

      if (!text.trim()) {
        output.innerHTML = '<span class="empty">Текст появится здесь.</span>';
        return;
      }

      const tokens = tokenize(text);
      let charPos = 0;

      tokens.forEach((token, index) => {
        const start = charPos;
        const end = charPos + token.length;
        charPos = end;

        if (!isWordLike(token)) {
          output.appendChild(document.createTextNode(token));
          return;
        }

        const hiddenByExcerpt = isInsideRanges(start, excerptRanges);
        const hiddenByWords = wordHiddenIndexes.has(index);
        const shouldHide = !revealAll && (hiddenByExcerpt || hiddenByWords);

        if (!shouldHide) {
          output.appendChild(document.createTextNode(token));
          return;
        }

        const span = document.createElement('span');
        span.dataset.original = token;
        span.textContent = currentMode === 'first' ? maskWord(token) : token;
        span.className = hiddenByExcerpt ? 'excerpt' : '';

        if (currentMode === 'blur') {
          span.classList.add('blurred');
        } else {
          span.classList.add('masked');
        }

        span.addEventListener('click', () => {
          span.textContent = span.dataset.original;
          span.classList.remove('blurred', 'masked', 'excerpt');
          span.classList.add('revealed');
        });

        output.appendChild(span);
      });
    }

    function buildAndRender() {
      const text = sourceText.value || '';
      const trimmed = text.trim();

      if (!trimmed) {
        lastRenderState = null;
        output.innerHTML = '<span class="empty">Текст появится здесь.</span>';
        return;
      }

      const tokens = tokenize(text);
      const hiddenWordIndexes = pickHiddenWordIndexes(tokens, currentWordPercent);
      const excerptRanges = pickExcerptCharacterRanges(text, currentExcerptPercent);

      lastRenderState = {
        text,
        hiddenWordIndexes,
        excerptRanges
      };

      renderText(text, hiddenWordIndexes, excerptRanges, false);
    }

    function rerenderExisting(revealAll = false) {
      if (!lastRenderState) {
        buildAndRender();
        return;
      }
      renderText(
        lastRenderState.text,
        lastRenderState.hiddenWordIndexes,
        lastRenderState.excerptRanges,
        revealAll
      );
    }

    wordPercentGroup.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-word-percent]');
      if (!button) return;
      currentWordPercent = Number(button.dataset.wordPercent);
      [...wordPercentGroup.querySelectorAll('button')].forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
      buildAndRender();
    });

    excerptPercentGroup.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-excerpt-percent]');
      if (!button) return;
      currentExcerptPercent = Number(button.dataset.excerptPercent);
      [...excerptPercentGroup.querySelectorAll('button')].forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
      buildAndRender();
    });

    modeBtn.addEventListener('click', () => {
      currentMode = currentMode === 'first' ? 'blur' : 'first';
      modeBtn.classList.toggle('active', currentMode === 'first');
      modeBtn.textContent = currentMode === 'first' ? 'Все буквы, кроме первых' : 'Размытие';
      rerenderExisting(false);
    });

    showBtn.addEventListener('click', buildAndRender);
    shuffleBtn.addEventListener('click', buildAndRender);
    revealAllBtn.addEventListener('click', () => rerenderExisting(true));

    sourceText.addEventListener('input', () => {
      lastRenderState = null;
      output.innerHTML = '<span class="empty">Нажми «Показать».</span>';
    });

    modeBtn.classList.add('active');
  </script>
</body>
</html>
